<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12306 中转方案浏览器</title>
<style>
:root {
  --bg: #f5f0e8; --card: #fff; --text: #333; --muted: #999;
  --blue: #2563eb; --green: #16a34a; --red: #dc2626; --orange: #ea580c;
  --border: #e5e0d8; --shadow: 0 2px 8px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
header h1 { font-size: 20px; white-space: nowrap; }
.stats { display: flex; gap: 12px; font-size: 13px; color: var(--muted); }
.stats span { background: var(--card); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.filters input, .filters select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--card); }
.filters input { width: 120px; }
table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); }
th { background: #1a1a2e; color: #fff; padding: 10px 8px; text-align: left; font-size: 12px; }
th.sortable { cursor: pointer; user-select: none; position: relative; padding-right: 22px; }
th.sortable:hover { opacity: 0.85; }
.sdir { position: absolute; right: 6px; font-size: 10px; opacity: 0.5; }
.sdir.active { opacity: 1; font-weight: bold; }
td { padding: 8px; font-size: 13px; border-bottom: 1px solid var(--border); }
tr:hover { background: #faf8f4; }
.train { font-weight: 600; color: var(--blue); }
.badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-g { background: #dbeafe; color: #1d4ed8; }
.badge-d { background: #dcfce7; color: #16a34a; }
.badge-k { background: #fef3c7; color: #b45309; }
.transfer-tag { font-size: 11px; padding: 1px 5px; border-radius: 3px; }
.transfer-same { background: #dcfce7; color: #166534; }
.transfer-city { background: #fef3c7; color: #92400e; }
.transfer-diff { background: #fee2e2; color: #991b1b; }
.seat { font-size: 11px; color: var(--muted); }
.price { font-weight: 600; color: var(--red); }
.time { font-variant-numeric: tabular-nums; }
.arrow { color: var(--muted); margin: 0 4px; }
.empty { text-align: center; padding: 40px; color: var(--muted); font-size: 15px; }
footer { margin-top: 16px; text-align: center; font-size: 12px; color: var(--muted); }
tr.hidden { display: none; }
/* Search Bar */
.search-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; padding: 12px; background: var(--card); border-radius: 8px; box-shadow: var(--shadow); }
.search-bar label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 2px; }
.search-bar input { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; width: 130px; }
.search-bar input.wide { width: 200px; }
.search-bar input.small { width: 80px; }
.btn-search { padding: 8px 20px; background: #1a56db; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-search:hover { background: #1e40af; }
.btn-search:disabled { opacity: 0.5; cursor: not-allowed; }
.api-status { font-size: 12px; color: var(--muted); margin-left: 4px; }
.api-status.error { color: var(--red); }
.api-status.ok { color: var(--green); }
/* Direct section */
.direct-section { margin-bottom: 16px; }
.direct-section h2 { font-size: 16px; margin-bottom: 8px; color: #1a1a2e; }
.direct-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 8px; }
.direct-table th { background: #2563eb; color: #fff; padding: 8px; text-align: left; font-size: 12px; }
.direct-table td { padding: 6px 8px; font-size: 13px; border-bottom: 1px solid var(--border); }

</style>
</head>
<body>
<header>
  <h1>🚄 <span id="route-title">12306 中转方案浏览器</span></h1>
  <div class="stats">
    <span id="stat-total">—</span>
    <span id="stat-hubs">—</span>
    <span id="stat-range">—</span>
  </div>
</header>
<div class="search-bar" id="search-bar">
  <label>出发站<input id="s-from" value="杭州" placeholder="如: 杭州"></label>
  <label>到达站<input id="s-to" value="兰考" placeholder="如: 兰考"></label>
  <label>日期<input id="s-date" type="date" style="width:150px"></label>
  <label>枢纽(可选)<input id="s-hubs" class="wide" placeholder="徐州,商丘,合肥"></label>
  <button class="btn-search" id="btn-search" onclick="doSearch()">🔍 查询</button>
  <span class="api-status" id="api-status"></span>
</div>
<div class="filters">
  <input id="filter-from" placeholder="出发时间 ≥" type="text" oninput="applyFilters()">
  <input id="filter-to" placeholder="到达时间 ≤" type="text" oninput="applyFilters()">
  <select id="filter-from-stn" onchange="applyFilters()"><option value="">起点站</option></select>
  <select id="filter-to-stn" onchange="applyFilters()"><option value="">终点站</option></select>
  <select id="filter-hub" onchange="applyFilters()"><option value="">全部中转站</option></select>
  <select id="filter-type" onchange="applyFilters()">
    <option value="">全部换乘类型</option><option value="same">站内</option><option value="city">同城</option><option value="diff">异站</option>
  </select>
  <select id="filter-train" onchange="applyFilters()">
    <option value="">全部车种</option><option value="G">G-高铁</option><option value="D">D-动车</option><option value="K">K-快速</option><option value="T">T-特快</option><option value="Z">Z-直达</option>
  </select>
  <input id="filter-cost" placeholder="费用 ≤" type="number" oninput="applyFilters()" style="width:100px">
  <select id="filter-seat1" onchange="applyFilters()">
    <option value="">车次1席位</option><option value="硬卧">硬卧</option><option value="软卧">软卧</option><option value="二等座">二等座</option><option value="一等座">一等座</option><option value="商务座">商务座</option><option value="硬座">硬座</option><option value="无座">无座</option>
  </select>
  <select id="filter-seat2" onchange="applyFilters()">
    <option value="">车次2席位</option><option value="硬卧">硬卧</option><option value="软卧">软卧</option><option value="二等座">二等座</option><option value="一等座">一等座</option><option value="商务座">商务座</option><option value="硬座">硬座</option><option value="无座">无座</option>
  </select>
  <button onclick="resetFilters()" style="padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer">重置</button>
</div>
<div class="direct-section" id="direct-section" style="display:none">
  <h2>🚄 直达车次 <span id="direct-count"></span></h2>
  <table class="direct-table">
    <thead><tr><th>车次</th><th>出发→到达</th><th>时间</th><th>历时</th><th>席位 / 票价</th></tr></thead>
    <tbody id="direct-tbody"></tbody>
  </table>
</div>
<div id="transfer-section">
<h3 style="font-size:14px;margin-bottom:8px;color:#1a1a2e">🔄 中转方案 <span id="transfer-count"></span></h3>
<table>
  <thead>
    <tr>
      <th onclick="sort('depart')" class="sortable">出发 <span class="sdir" id="sdir-depart"></span></th>
      <th onclick="sort('arrive')" class="sortable">到达 <span class="sdir" id="sdir-arrive"></span></th>
      <th onclick="sort('hub')" class="sortable">中转 <span class="sdir" id="sdir-hub"></span></th>
      <th onclick="sort('type')" class="sortable">换乘 <span class="sdir" id="sdir-type"></span></th>
      <th onclick="sort('train1')" class="sortable">第1程 <span class="sdir" id="sdir-train1"></span></th>
      <th onclick="sort('train2')" class="sortable">第2程 <span class="sdir" id="sdir-train2"></span></th>
      <th onclick="sort('gap')" class="sortable">等待△ <span class="sdir" id="sdir-gap"></span></th>
      <th onclick="sort('total')" class="sortable">全程△ <span class="sdir" id="sdir-total"></span></th>
      <th onclick="sort('cost')" class="sortable">费用△ <span class="sdir" id="sdir-cost"></span></th>
      <th>席位</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div class="empty" id="empty" style="display:none">无匹配方案</div>
</div>
<footer>数据来源: 12306 API · 拖拽 JSON 文件到页面加载 · <a href="https://kyfw.12306.cn" target="_blank">12306官网</a></footer>

<script>
let data = [];
let hubSet = new Set();
let sortKey = 'total', sortDir = 1;

const API_BASE = localStorage.getItem('api_base') || 'https://train-query.illustrious-panda.workers.dev';

const TYPES = { same: '站内', city: '同城', diff: '异站' };
const typeClass = { same: 'transfer-same', city: 'transfer-city', diff: 'transfer-diff' };

function badge(t) {
  const c = t[0];
  return `<span class="badge badge-${c.toLowerCase()}">${t}</span>`;
}

function transferInfo(s) {
  const a = s.leg1.to, d = s.leg2.from;
  if (a === d) return ['站内', 'same', ''];
  const ba = a.replace(/[东南西北]$/, ''), bd = d.replace(/[东南西北]$/, '');
  if (ba === bd) return ['同城', 'city', ` ${a}→${d}`];
  return ['异站', 'diff', ` ${a}→${d}`];
}

function getSeatSummary(t) {
  const s = t.seats || {};
  return Object.entries(s).slice(0, 3).map(([k, v]) =>
    `<span class="seat">${k}${v === '有' ? '' : v + '张'}</span>`).join(' ');
}

function toMin(t) { const p = (t || '').split(':'); return parseInt(p[0]) * 60 + parseInt(p[1] || '0'); }

function renderDirect(direct) {
  const sec = document.getElementById('direct-section');
  if (!direct || !direct.trains || !direct.trains.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('direct-count').textContent = `共 ${direct.trains.length} 趟`;
  document.getElementById('direct-tbody').innerHTML = direct.trains.map(t => {
    const seats = Object.entries(t.seats || {}).map(([k, v]) =>
      `<span class="seat">${k}${v === '有' ? '有' : v + '张'}</span>`).join(' ');
    const prices = Object.entries(t.prices || {}).slice(0, 3).map(([k, v]) =>
      `<span class="price">¥${v}</span>`).join(' ');
    return `<tr>
      <td>${badge(t.train_code)}</td>
      <td>${t.from}→${t.to}</td>
      <td class="time">${t.depart}→${t.arrive}</td>
      <td>${t.duration}</td>
      <td>${seats} ${prices}</td></tr>`;
  }).join('');
}

async function doSearch() {
  const from = document.getElementById('s-from').value.trim();
  const to = document.getElementById('s-to').value.trim();
  const date = document.getElementById('s-date').value;
  const hubs = document.getElementById('s-hubs').value.trim();
  if (!from || !to || !date) { alert('请填写出发站、到达站和日期'); return; }
  if (!API_BASE) {
    const u = prompt('请先填入 API Worker 地址:\n(部署 assets/worker.js 到 Cloudflare Workers 后获得)', localStorage.getItem('api_base') || '');
    if (!u) return;
    localStorage.setItem('api_base', u);
    location.reload();
    return;
  }

  const btn = document.getElementById('btn-search');
  const status = document.getElementById('api-status');
  btn.disabled = true; btn.textContent = '查询中...';
  status.textContent = ''; status.className = 'api-status';

  try {
    const params = new URLSearchParams({ from, to, date });
    if (hubs) params.set('hubs', hubs);
    const resp = await fetch(`${API_BASE}/api/query?${params}`);
    const json = await resp.json();
    if (json.error) throw new Error(json.error);
    loadData(json);
    status.textContent = '✓'; status.className = 'api-status ok';
  } catch (e) {
    status.textContent = `✗ ${e.message}`; status.className = 'api-status error';
  } finally {
    btn.disabled = false; btn.textContent = '🔍 查询';
  }
}

function renderRow(s) {
  const [tLabel, tKey, tDetail] = transferInfo(s);
  const td = s.total_duration || 0, g = s.gap_min || 0;
  const p1 = s.leg1.prices || {}, p2 = s.leg2.prices || {};
  const c1 = Math.min(...Object.values(p1).filter(v => v > 0), 999);
  const c2 = Math.min(...Object.values(p2).filter(v => v > 0), 999);
  const hub = s.transfer.replace(/[东南西北]$/, '');
  const dMin = toMin(s.leg1.depart), aMin = toMin(s.leg2.arrive);
  return `
    <tr data-depart="${s.leg1.depart}" data-depart-min="${dMin}"
        data-arrive="${s.leg2.arrive}" data-arrive-min="${aMin}"
        data-hub="${hub}"
        data-type="${tKey}" data-train="${s.leg1.train_code[0]}${s.leg2.train_code[0]}"
        data-cost="${c1 + c2}" data-gap="${g}" data-total="${td}"
        data-train1="${s.leg1.train_code}" data-train2="${s.leg2.train_code}"
        data-seats1="${Object.keys(s.leg1.seats||{}).join(',')}"
        data-seats2="${Object.keys(s.leg2.seats||{}).join(',')}"
        data-from-stn="${s.leg1.from}" data-to-stn="${s.leg2.to}">
      <td class="time">${s.leg1.depart}</td>
      <td class="time">${s.leg2.arrive}</td>
      <td>${hub}</td>
      <td><span class="transfer-tag ${typeClass[tKey]}">${tLabel}</span>${tDetail}</td>
      <td>${badge(s.leg1.train_code)} <span class="time">${s.leg1.depart}→${s.leg1.arrive}</span> ${s.leg1.from}→${s.leg1.to}</td>
      <td>${badge(s.leg2.train_code)} <span class="time">${s.leg2.depart}→${s.leg2.arrive}</span> ${s.leg2.from}→${s.leg2.to}</td>
      <td>${Math.floor(g/60)}h${g%60}m</td>
      <td>${Math.floor(td/60)}h${td%60}m</td>
      <td class="price">¥${c1 + c2}</td>
      <td>${getSeatSummary(s.leg1)} / ${getSeatSummary(s.leg2)}</td>
    </tr>`;
}

function renderTable() {
  document.getElementById('stat-total').textContent = `共 ${data.length} 方案`;
  document.getElementById('stat-hubs').textContent = `${hubSet.size} 个中转站`;
  document.getElementById('tbody').innerHTML = data.map(renderRow).join('');
}

function applyFilters() {
  const fFrom = document.getElementById('filter-from').value;
  const fTo = document.getElementById('filter-to').value;
  const fHub = document.getElementById('filter-hub').value;
  const fFromStn = document.getElementById('filter-from-stn').value;
  const fToStn = document.getElementById('filter-to-stn').value;
  const fType = document.getElementById('filter-type').value;
  const fTrain = document.getElementById('filter-train').value;
  const fCost = parseInt(document.getElementById('filter-cost').value) || 0;
  const fSeat1 = document.getElementById('filter-seat1').value;
  const fSeat2 = document.getElementById('filter-seat2').value;
  const rows = document.querySelectorAll('#tbody tr');
  let visible = 0;
  rows.forEach(row => {
    let show = true;
    if (fFrom && row.dataset.depart < fFrom) show = false;
    if (fTo && row.dataset.arrive > fTo) show = false;
    if (fHub && row.dataset.hub !== fHub) show = false;
    if (fFromStn && row.dataset.fromStn !== fFromStn) show = false;
    if (fToStn && row.dataset.toStn !== fToStn) show = false;
    if (fType && row.dataset.type !== fType) show = false;
    if (fTrain && !row.dataset.train.includes(fTrain)) show = false;
    if (fCost && parseInt(row.dataset.cost) > fCost) show = false;
    if (fSeat1 && !row.dataset.seats1.includes(fSeat1)) show = false;
    if (fSeat2 && !row.dataset.seats2.includes(fSeat2)) show = false;
    row.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('empty').style.display = visible ? 'none' : 'block';
}

function resetFilters() {
  document.querySelectorAll('.filters input, .filters select').forEach(el => el.value = '');
  document.getElementById('filter-hub').value = '';
  document.getElementById('filter-from-stn').value = '';
  document.getElementById('filter-to-stn').value = '';
  document.getElementById('filter-seat1').value = '';
  document.getElementById('filter-seat2').value = '';
  applyFilters();
}

function sort(key) {
  if (sortKey === key) sortDir = -sortDir; else { sortKey = key; sortDir = 1; }
  // 更新所有排序箭头
  document.querySelectorAll('.sdir').forEach(el => { el.textContent = ''; el.classList.remove('active'); });
  const sdir = document.getElementById('sdir-' + key);
  if (sdir) { sdir.textContent = sortDir === 1 ? '▲' : '▼'; sdir.classList.add('active'); }
  const tbody = document.getElementById('tbody');
  const rows = [...tbody.querySelectorAll('tr')];
  rows.sort((a, b) => {
    const va = a.dataset[key + '-min'] || a.dataset[key] || '';
    const vb = b.dataset[key + '-min'] || b.dataset[key] || '';
    const na = parseFloat(va), nb = parseFloat(vb);
    return (isNaN(na) ? va.localeCompare(vb, 'zh') : na - nb) * sortDir;
  });
  rows.forEach(r => tbody.appendChild(r));
}

async function loadData(src) {
  try {
    let json;
    if (src === null || src === undefined) {
      showEmpty('无数据 — 请拖拽 JSON 文件或点击查询');
      return;
    }
    if (typeof src === 'string') {
      const resp = await fetch(src);
      json = await resp.json();
    } else if (src.text && typeof src.text === 'function') {
      json = JSON.parse(await src.text());
    } else {
      json = src;
    }
    // Support both old (transfers only) and new (direct + transfers) format
    const transfers = json.transfers?.transfers || json.transfers || [];
    data = (Array.isArray(transfers) ? transfers : []).filter(s => s.leg1 && s.leg2);
    const route = (json.from && json.to) ? `${json.from} → ${json.to}` : '12306 中转方案';
    document.getElementById('route-title').textContent = route;
    // Direct
    renderDirect(json.direct);
    // Transfer stats
    document.getElementById('transfer-count').textContent = data.length ? `共 ${data.length} 方案` : '';
    document.getElementById('stat-total').textContent = data.length ? `共 ${data.length} 方案` : '';
    hubSet = new Set(data.map(s => s.transfer.replace(/[东南西北]$/, '')));
    document.getElementById('stat-hubs').textContent = `${hubSet.size} 个中转站`;
    // Populate filter dropdowns
    const selHub = document.getElementById('filter-hub');
    const selFromStn = document.getElementById('filter-from-stn');
    const selToStn = document.getElementById('filter-to-stn');
    [selHub, selFromStn, selToStn].forEach(s => { while (s.options.length > 1) s.remove(1); });
    const fromStnSet = new Set(data.map(s => s.leg1.from));
    const toStnSet = new Set(data.map(s => s.leg2.to));
    [...hubSet].sort().forEach(h => { const o = document.createElement('option'); o.value = h; o.textContent = h; selHub.appendChild(o); });
    [...fromStnSet].sort().forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; selFromStn.appendChild(o); });
    [...toStnSet].sort().forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; selToStn.appendChild(o); });
    renderTable();
    applyFilters();
    sort('total');
  } catch (e) { showEmpty(`加载失败: ${e.message}`); }
}

function showEmpty(msg) {
  document.getElementById('direct-section').style.display = 'none';
  document.getElementById('tbody').innerHTML = `<tr><td colspan="10" class="empty">${msg}</td></tr>`;
  document.getElementById('stat-total').textContent = '—';
  document.getElementById('transfer-count').textContent = '';
}

// 拖拽加载
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) loadData(file);
});

// 默认加载样本数据
const params = new URLSearchParams(location.search);
const src = params.get('src') || '/tmp/sample_data.json';
// Set default date to today
const today = new Date().toISOString().split('T')[0];
document.getElementById('s-date').value = today;
loadData(src);
</script>
</body>
</html>
